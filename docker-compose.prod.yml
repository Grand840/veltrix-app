services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      victoria-metrics:
        condition: service_healthy
    env_file:
    - .env.production
    environment:
      APP_ENV: production
      DEBUG: 'false'
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
      VICTORIA_METRICS_URL: http://victoria-metrics:8428
    expose:
    - '8000'
    ports:
    - 8000:8000
    restart: always
  caddy:
    depends_on:
    - api
    - frontend
    image: caddy:2-alpine
    ports:
    - 80:80
    restart: always
    volumes:
    - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://veltrix.ddns.net}
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
    - api
    expose:
    - '3000'
    restart: always
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    expose:
    - '5432'
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER}
      timeout: 5s
    image: postgres:16-alpine
    restart: always
    volumes:
    - postgres_data:/var/lib/postgresql/data
  redis:
    expose:
    - '6379'
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD
      - redis-cli
      - ping
      timeout: 5s
    image: redis:7-alpine
    restart: always
    volumes:
    - redis_data:/data
  victoria-metrics:
    command:
    - --storageDataPath=/storage
    - --retentionPeriod=90d
    expose:
    - '8428'
    image: victoriametrics/victoria-metrics:latest
    restart: always
    volumes:
    - victoria_data:/storage
volumes:
  postgres_data: null
  redis_data: null
  victoria_data: null
